name: Deploy Backend (Prebuilt, SCP)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        run: |
          docker buildx version
          docker buildx create --name hunch-builder --driver docker-container --use || docker buildx use hunch-builder
          docker buildx inspect --bootstrap

      - name: Start ssh-agent
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          printf 'SSH_AUTH_SOCK=%s\n' "${SSH_AUTH_SOCK}" >> "${GITHUB_ENV}"
          printf 'SSH_AGENT_PID=%s\n' "${SSH_AGENT_PID}" >> "${GITHUB_ENV}"
          printf '%s\n' "${SSH_PRIVATE_KEY}" | ssh-add -

      - name: Configure pinned known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "${SSH_HOST}" ]; then
            echo "SSH_HOST is required (set as a GitHub secret)." >&2
            exit 1
          fi
          if [ -z "${SSH_KNOWN_HOSTS}" ]; then
            echo "SSH_KNOWN_HOSTS secret is required and must contain the pinned host key line(s)." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy backend (prebuilt)
        env:
          REMOTE_HOST: ubuntu@${{ secrets.SSH_HOST }}
          PLATFORM: linux/arm64
          LOCAL_IMAGE_CLEANUP: "1"
          LOCAL_BUILDER_PRUNE: "0"
        run: |
          chmod +x ops/deploy-local-prebuilt.sh
          ops/deploy-local-prebuilt.sh
