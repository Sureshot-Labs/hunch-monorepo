# GitHub Actions CI/CD Pipeline for Hunch Platform
name: Deploy Hunch Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Test job
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hunch_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run type checking
      run: pnpm typecheck

    - name: Run linting
      run: pnpm lint

    - name: Run tests
      run: pnpm test
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/hunch_test
        REDIS_URL: redis://localhost:6379

    - name: Run integration tests
      run: pnpm test:integration
      env:
        DATABASE_URL: postgresql://postgres:test@localhost:5432/hunch_test
        REDIS_URL: redis://localhost:6379

  # Build job
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/api
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/trading-engine
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/analytics-engine
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/webhook-system
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/price-history
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/data-ingestion
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/monitoring
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.api
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/api:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Trading Engine image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.trading-engine
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/trading-engine:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Analytics Engine image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.analytics-engine
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/analytics-engine:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Webhook System image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.webhook-system
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/webhook-system:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Price History image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.price-history
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/price-history:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Data Ingestion image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.data-ingestion
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/data-ingestion:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push Monitoring image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ops/Dockerfile.monitoring
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/monitoring:${{ env.IMAGE_TAG }}
        labels: ${{ steps.meta.outputs.labels }}

  # Deploy to staging
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add staging deployment commands here
        echo "Staging deployment completed"

  # Deploy to production
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add production deployment commands here
        echo "Production deployment completed"

  # Security scan
  security-scan:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Performance test
  performance-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run performance tests
      run: |
        echo "Running performance tests..."
        # Add performance test commands here
        echo "Performance tests completed"

  # Notification
  notify:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Notify deployment status
      run: |
        if [ "${{ needs.deploy-staging.result }}" == "success" ] || [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
