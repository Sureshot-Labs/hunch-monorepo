# Kubernetes Secrets for Hunch platform
apiVersion: v1
kind: Secret
metadata:
  name: hunch-secrets
  namespace: hunch
type: Opaque
data:
  # Database password (base64 encoded)
  POSTGRES_PASSWORD: <base64-encoded-password>
  
  # Redis password (base64 encoded)
  REDIS_PASSWORD: <base64-encoded-password>
  
  # JWT secret (base64 encoded)
  JWT_SECRET: <base64-encoded-jwt-secret>
  
  # Exchange API keys (base64 encoded)
  POLYMARKET_API_KEY: <base64-encoded-polymarket-key>
  LIMITLESS_API_KEY: <base64-encoded-limitless-key>
  
  # Alert configuration (base64 encoded)
  ALERT_EMAIL: <base64-encoded-email>
  ALERT_SLACK_WEBHOOK: <base64-encoded-slack-webhook>
  ALERT_PAGERDUTY_KEY: <base64-encoded-pagerduty-key>
  
  # SMTP configuration (base64 encoded)
  SMTP_HOST: <base64-encoded-smtp-host>
  SMTP_PORT: <base64-encoded-smtp-port>
  SMTP_USER: <base64-encoded-smtp-user>
  SMTP_PASS: <base64-encoded-smtp-password>
  
  # Grafana password (base64 encoded)
  GRAFANA_PASSWORD: <base64-encoded-grafana-password>

---
# Kalshi API key as a separate secret (since it's a file)
apiVersion: v1
kind: Secret
metadata:
  name: kalshi-api-key
  namespace: hunch
type: Opaque
data:
  kalshiKey.txt: <base64-encoded-kalshi-key-file>
