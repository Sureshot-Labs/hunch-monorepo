# Kubernetes ConfigMap for Hunch platform configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: hunch-config
  namespace: hunch
data:
  # Database configuration
  DATABASE_URL: "postgresql://hunch:$(POSTGRES_PASSWORD)@postgres-service:5432/hunch"
  
  # Redis configuration
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis-service:6379"
  
  # API Gateway configuration
  API_PORT: "3000"
  API_HOST: "0.0.0.0"
  CORS_ORIGIN: "https://your-domain.com"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
  
  # Trading Engine configuration
  TRADING_ENGINE_PORT: "3001"
  TRADING_ENGINE_HEALTH_PORT: "3002"
  ENABLE_HEALTH_CHECK: "true"
  
  # Analytics Engine configuration
  ANALYTICS_ENGINE_PORT: "3003"
  CACHE_TTL: "300"
  ANALYSIS_TIMEOUT: "30000"
  
  # Webhook System configuration
  WEBHOOK_SYSTEM_PORT: "3004"
  MAX_CONCURRENT_DELIVERIES: "100"
  DELIVERY_TIMEOUT: "30000"
  RETRY_MAX_ATTEMPTS: "3"
  
  # Price History Service configuration
  PRICE_HISTORY_PORT: "3005"
  COLLECTION_INTERVAL: "60000"
  BATCH_SIZE: "1000"
  
  # Data Ingestion Service configuration
  DATA_INGESTION_PORT: "3006"
  QUEUE_CONCURRENCY: "10"
  BATCH_SIZE: "100"
  RATE_LIMIT_PER_MINUTE: "60"
  
  # Monitoring Service configuration
  MONITORING_PORT: "3007"
  MONITORING_METRICS_PORT: "9090"
  MONITORING_ALERT_INTERVAL: "10"
  MONITORING_ALERT_COOLDOWN: "5"
  
  # Logging configuration
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Retention configuration
  MONITORING_METRICS_RETENTION: "30"
  MONITORING_ALERTS_RETENTION: "90"
  MONITORING_LOGS_RETENTION: "7"
