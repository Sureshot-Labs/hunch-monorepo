# Nginx main configuration for production
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=trading:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=analytics:10m rate=20r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn_zone $server_name zone=conn_limit_per_server:10m;

    # Upstream servers
    upstream api_backend {
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream trading_backend {
        server trading-engine:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream analytics_backend {
        server analytics-engine:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream webhook_backend {
        server webhook-system:3004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream price_history_backend {
        server price-history:3005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream data_ingestion_backend {
        server data-ingestion:3006 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream monitoring_backend {
        server monitoring:3007 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Include server configurations
    include /etc/nginx/conf.d/*.conf;
}
