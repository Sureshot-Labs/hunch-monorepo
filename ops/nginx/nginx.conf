user nginx;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 20m;
  limit_req_zone $binary_remote_addr zone=solana_rpc:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=api_public:20m rate=6000r/m;
  limit_req_zone $binary_remote_addr zone=app_pages:20m rate=1200r/m;
  limit_req_zone $binary_remote_addr zone=app_api:20m rate=1200r/m;
  limit_req_zone $server_name zone=app_meta_categories:1m rate=300r/s;

  include /etc/nginx/conf.d/*.conf;
}
