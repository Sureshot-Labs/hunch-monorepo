networks:
  hunch-net:
    driver: bridge
  hunch-edge:
    external: true
  hunch-internal:
    external: true

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: hunch-postgres
    restart: unless-stopped
    networks:
      - hunch-net
    environment:
      POSTGRES_USER: ${PGUSER:-hunch}
      POSTGRES_PASSWORD: ${PGPASSWORD:-hunch}
      POSTGRES_DB: ${PGDATABASE:-hunch}
    ports:
      - "127.0.0.1:${PGPORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PGUSER:-hunch} -d ${PGDATABASE:-hunch}"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - ${PGDATA_DIR:-/opt/hunch-data/postgres}:/var/lib/postgresql/data
    shm_size: ${PG_SHM_SIZE:-2gb}
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-1GB}
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-6GB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-256MB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - shared_preload_libraries=${PG_SHARED_PRELOAD_LIBRARIES:-timescaledb,pg_stat_statements}
      - -c
      - track_io_timing=${PG_TRACK_IO_TIMING:-on}
      - -c
      - max_parallel_workers=${PG_MAX_PARALLEL_WORKERS:-4}
      - -c
      - max_parallel_workers_per_gather=${PG_MAX_PARALLEL_WORKERS_PER_GATHER:-2}
      - -c
      - statement_timeout=${PG_STATEMENT_TIMEOUT:-120000}
      - -c
      - max_wal_size=${PG_MAX_WAL_SIZE:-4GB}
      - -c
      - min_wal_size=${PG_MIN_WAL_SIZE:-1GB}
      - -c
      - wal_compression=${PG_WAL_COMPRESSION:-on}
      - -c
      - checkpoint_completion_target=${PG_CHECKPOINT_COMPLETION_TARGET:-0.9}

  redis:
    image: redis/redis-stack-server:latest
    container_name: hunch-redis
    restart: unless-stopped
    networks:
      - hunch-net
    environment:
      REDIS_ARGS: "--save 60 1 --loglevel warning"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - ${REDIS_DATA_DIR:-/opt/hunch-data/redis}:/data

  api:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-api
    restart: unless-stopped
    networks:
      hunch-net:
      hunch-internal:
        aliases:
          - api
    env_file:
      - /opt/hunch/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3001}
      HUNCH_JS_RUNTIME: ${HUNCH_API_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_API:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/api,aws-sm:/hunch/prod/polymarket-builder,aws-sm:/hunch/prod/rewards,aws-sm:/hunch/prod/ai,aws-sm:/hunch/prod/ops}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    ports:
      - "127.0.0.1:${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/api/dist/server.js

  indexer-polymarket:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-indexer-polymarket
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_POLYMARKET:-aws-sm:/hunch/prod/shared}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/indexer-polymarket/dist/main.js

  indexer-limitless:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-indexer-limitless
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_LIMITLESS:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/indexer-limitless}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/indexer-limitless/dist/main.js

  indexer-dflow:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-indexer-dflow
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_DFLOW:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/indexer-dflow}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/indexer-dflow/dist/main.js

  ai-worker:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-ai-worker
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_AI_WORKER:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/ai}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/ai-worker/dist/main.js

  finance-worker:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-finance-worker
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_FINANCE_WORKER:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/api,aws-sm:/hunch/prod/polymarket-builder,aws-sm:/hunch/prod/rewards}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/finance-worker/dist/main.js

  signal-bot:
    build:
      context: .
      dockerfile: ops/Dockerfile.app
    container_name: hunch-signal-bot
    restart: unless-stopped
    networks:
      - hunch-net
    env_file:
      - /opt/hunch/.env
    environment:
      HUNCH_JS_RUNTIME: ${HUNCH_WORKER_JS_RUNTIME:-bun}
      HUNCH_SECRET_BUNDLES: ${HUNCH_SECRET_BUNDLES_SIGNAL_BOT:-aws-sm:/hunch/prod/shared,aws-sm:/hunch/prod/signal-bot}
    volumes:
      - /opt/hunch/.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - /app/ops/run-js-runtime.sh
      - packages/config/dist/run-with-secrets.js
      - apps/api/dist/signal-bot-runner.js

  nginx:
    image: nginx:1.27-alpine
    container_name: hunch-nginx
    restart: unless-stopped
    networks:
      - hunch-net
      - hunch-edge
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_APP_SERVER_NAME: ${NGINX_APP_SERVER_NAME:-_}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-3600}
      NGINX_SSL_CERT: ${NGINX_SSL_CERT:-}
      NGINX_SSL_KEY: ${NGINX_SSL_KEY:-}
      NGINX_APP_SSL_CERT: ${NGINX_APP_SSL_CERT:-}
      NGINX_APP_SSL_KEY: ${NGINX_APP_SSL_KEY:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./ops/nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${NGINX_LOG_DIR:-/opt/hunch-data/nginx}:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    command: ["/bin/sh", "/etc/nginx/entrypoint.sh"]
