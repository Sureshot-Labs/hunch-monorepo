networks:
  hunch-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  os_data:

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: hunch-postgres
    networks:
      - hunch-net
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-hunch}
      POSTGRES_PASSWORD: ${PGPASSWORD:-hunch}
      POSTGRES_DB: ${PGDATABASE:-hunch}
    ports:
      - "${PGPORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PGUSER:-hunch} -d ${PGDATABASE:-hunch}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data
    shm_size: 256mb
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=100
      - -c
      - effective_cache_size=256MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - work_mem=4MB
      - -c
      - statement_timeout=30000

  redis:
    image: redis:7-alpine
    container_name: hunch-redis
    networks:
      - hunch-net
    restart: unless-stopped
    command:
      - redis-server
      - "--save"
      - "60"
      - "1"
      - "--loglevel"
      - warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

