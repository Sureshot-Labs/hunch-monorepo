networks:
  hunch-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  os_data:

services:
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: hunch-postgres
    networks:
      - hunch-net
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-hunch}
      POSTGRES_PASSWORD: ${PGPASSWORD:-hunch}
      POSTGRES_DB: ${PGDATABASE:-hunch}
    ports:
      # Override PG_BIND_HOST=0.0.0.0 only when you explicitly need remote access.
      - "${PG_BIND_HOST:-127.0.0.1}:${PGPORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PGUSER:-hunch} -d ${PGDATABASE:-hunch}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data
    shm_size: ${PG_SHM_SIZE:-2gb}
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-1GB}
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-6GB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-256MB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - shared_preload_libraries=${PG_SHARED_PRELOAD_LIBRARIES:-timescaledb,pg_stat_statements}
      - -c
      - track_io_timing=${PG_TRACK_IO_TIMING:-on}
      - -c
      - max_parallel_workers=${PG_MAX_PARALLEL_WORKERS:-4}
      - -c
      - max_parallel_workers_per_gather=${PG_MAX_PARALLEL_WORKERS_PER_GATHER:-2}
      - -c
      - statement_timeout=${PG_STATEMENT_TIMEOUT:-120000}
      - -c
      - max_wal_size=${PG_MAX_WAL_SIZE:-4GB}
      - -c
      - min_wal_size=${PG_MIN_WAL_SIZE:-1GB}
      - -c
      - wal_compression=${PG_WAL_COMPRESSION:-on}
      - -c
      - checkpoint_completion_target=${PG_CHECKPOINT_COMPLETION_TARGET:-0.9}

  redis:
    image: redis/redis-stack-server:latest
    container_name: hunch-redis
    networks:
      - hunch-net
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--save 60 1 --loglevel warning"
    ports:
      # Override REDIS_BIND_HOST=0.0.0.0 only when you explicitly need remote access.
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

