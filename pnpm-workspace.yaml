packages:
  - apps/*
  - packages/*

allowBuilds:
  bigint-buffer: false
  bufferutil: false
  esbuild: true
  keccak: false
  secp256k1: false
  utf-8-validate: false

onlyBuiltDependencies:
  - esbuild

overrides:
  '@hpke/core@<=1.7.4': '>=1.7.5'
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  cookie@<0.7.0: '>=0.7.0'
  diff@>=5.0.0 <5.2.2: '>=5.2.2'
  fastify@<=5.7.2: '>=5.7.3'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  qs@<6.14.1: '>=6.14.1'
  tmp@<=0.2.3: '>=0.2.4'
  undici@>=7.0.0 <7.18.2: '>=7.18.2'
